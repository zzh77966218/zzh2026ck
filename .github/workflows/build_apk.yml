name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_client/**'
  workflow_dispatch:

env:
  ANDROID_HOME: /opt/android-sdk
  ANDROID_SDK_ROOT: /opt/android-sdk
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libgbm-dev \
            libwayland-dev \
            xclip \
            zipalign \
            openjdk-17-jdk \
            wget \
            unzip

      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -10

      - name: Install Python dependencies
        working-directory: android_client
        run: |
          pip install --upgrade pip wheel setuptools 2>&1 | tail -5
          pip install cython 2>&1 | tail -5
          pip install -r requirements.txt 2>&1 | tail -10
          pip install buildozer==1.5.0 2>&1 | tail -5

      - name: Build APK
        working-directory: android_client
        run: |
          buildozer android debug 2>&1 | tee build.log
        continue-on-error: true

      - name: Show build log
        if: failure()
        working-directory: android_client
        run: |
          echo "=== Build Log (last 50 lines) ==="
          tail -50 build.log 2>/dev/null || echo "No build.log found"

      - name: Show .buildozer directory
        working-directory: android_client
        run: |
          echo "=== .buildozer directory ==="
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"

      - name: Show buildozer logs
        working-directory: android_client
        run: |
          echo "=== Buildozer logs ==="
          ls -la ~/.buildozer/logs/ 2>/dev/null || echo "No logs directory"
          cat ~/.buildozer/logs/*.log 2>/dev/null | tail -100 || echo "No logs"

      - name: List build output
        working-directory: android_client
        run: |
          echo "=== bin directory ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory"
          echo "=== All files ==="
          find . -name "*.apk" 2>/dev/null

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android_client/build.log
            android_client/.buildozer/**/*.log
            ~/.buildozer/logs/*.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: remotecontrol-apk
          path: android_client/bin/*.apk
          retention-days: 30