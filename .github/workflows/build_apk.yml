name: Build Android APK

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'android_client/**'
      - '.github/workflows/build_apk.yml'
  workflow_dispatch:

env:
  ANDROID_HOME: /opt/android-sdk
  ANDROID_SDK_ROOT: /opt/android-sdk
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  BUILDOZER_SDK_DIR: /opt/android-sdk
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libgbm-dev \
            libwayland-dev \
            xclip \
            zipalign \
            openjdk-17-jdk \
            wget \
            unzip \
            git \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev
          echo "✓ System dependencies installed"

      - name: Install Android SDK
        run: |
          echo "📦 Installing Android SDK..."
          mkdir -p $ANDROID_HOME/cmdline-tools
          
          # 下载Android命令行工具
          cd /tmp
          if [ ! -f "commandlinetools.zip" ]; then
            echo "⬇️  Downloading Android Command Line Tools..."
            wget -q --show-progress https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O commandlinetools.zip
            echo "✓ Download complete"
          fi
          
          # 解压到指定目录
          unzip -q commandlinetools.zip -d $ANDROID_HOME/cmdline-tools/
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          
          # 添加到PATH
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          
          # 自动接受所有license
          echo "📋 Accepting Android licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          
          # 安装SDK
          echo "📥 Installing SDK components..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;25b" \
            "cmake;3.22.1" \
            2>&1 | grep -E "Installing|Installed|Done|Error" || true
          
          # 验证安装
          echo "✓ Android SDK installed"
          echo "SDK Version: $(ls $ANDROID_HOME/platforms)"

      - name: Install Python dependencies
        run: |
          echo "🐍 Installing Python dependencies..."
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer==1.5.0
          
          # 安装应用依赖
          echo "📦 Installing app requirements..."
          if [ -f "android_client/requirements.txt" ]; then
            pip install -r android_client/requirements.txt
          fi
          
          echo "✓ Python dependencies installed"
          buildozer --version

      - name: Configure buildozer SDK
        run: |
          echo "⚙️  Configuring buildozer..."
          
          # 建立buildozer目录结构
          mkdir -p ~/.buildozer/android/platform
          mkdir -p ~/.buildozer/android/git
          mkdir -p ~/.buildozer/android/inputs
          mkdir -p ~/.buildozer/android/outputs
          
          # 清理旧配置
          rm -rf ~/.buildozer/android/platform/android-sdk 2>/dev/null || true
          
          # 复制SDK（使用cp -a保持权限）
          echo "🔄 Copying Android SDK..."
          cp -a $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
          
          # 创建buildozer配置文件
          echo "sdk.dir = ~/.buildozer/android/platform/android-sdk" > ~/.buildozer/android.properties
          echo "ndk.dir = ~/.buildozer/android/platform/android-sdk/ndk/25b" >> ~/.buildozer/android.properties
          echo "api.level = 34" >> ~/.buildozer/android.properties
          
          # 验证配置
          echo "✓ buildozer configured"
          echo "=== Config File ==="
          cat ~/.buildozer/android.properties
          echo "=== SDK Dir Contents ==="
          ls -la ~/.buildozer/android/platform/android-sdk/platforms 2>/dev/null | head -5

      - name: Build APK
        working-directory: android_client
        env:
          ANDROID_HOME: ~/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk
          NDK_VERSION: 25b
        run: |
          echo "🔨 Building APK..."
          
          # 创建local.properties
          echo "sdk.dir=$(realpath ~/.buildozer/android/platform/android-sdk)" > local.properties
          echo "ndk.dir=$(realpath ~/.buildozer/android/platform/android-sdk)/ndk/25b" >> local.properties
          
          # 清理之前的构建
          rm -rf build bin dist .buildozer
          
          # 显示环境
          echo "📋 Environment:"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "NDK: $NDK_VERSION"
          echo "Python: $(python --version)"
          
          # 运行buildozer
          echo "⏳ Buildozer running (this may take 15-20 minutes)..."
          buildozer android debug 2>&1 | tee build.log
          
          BUILD_RESULT=${PIPESTATUS[0]}
          if [ $BUILD_RESULT -eq 0 ]; then
            echo "✅ Build successful!"
          else
            echo "❌ Build failed with exit code $BUILD_RESULT"
            exit $BUILD_RESULT
          fi

      - name: Show build log
        if: always()
        run: |
          echo "📋 Build Log (last 150 lines):"
          if [ -f "android_client/build.log" ]; then
            tail -150 android_client/build.log
          else
            echo "No build.log found"
          fi

      - name: Check build output
        if: always()
        run: |
          echo "📦 Checking build outputs..."
          if [ -d "android_client/bin" ]; then
            echo "=== bin directory content ==="
            ls -lah android_client/bin/
          else
            echo "⚠️  No bin directory found"
          fi
          
          if [ -d "android_client/dist" ]; then
            echo "=== dist directory content ==="
            ls -lah android_client/dist/
          fi
          
          if [ -d "android_client/.buildozer" ]; then
            echo "=== .buildozer logs ==="
            find android_client/.buildozer -name "*.log" -type f -exec ls -lah {} \;
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            android_client/build.log
            android_client/.buildozer/**/*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK artifact
        if: success() && hashFiles('android_client/bin/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: remotelink-apk
          path: android_client/bin/*.apk
          retention-days: 30

      - name: Create Release
        if: success() && hashFiles('android_client/bin/*.apk') != ''
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}-apk
          release_name: RemoteLink APK Build #${{ github.run_number }}
          body: |
            ## RemoteLink Android APK
            
            自动构建版本：v2.0
            
            ### 安装步骤：
            1. 下载APK文件
            2. 在Android设备上安装
            3. 启动应用并扫码连接服务器
            
            ### 更新日期：${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: true

      - name: Build summary
        if: always()
        run: |
          echo "## 🔨 RemoteLink APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** APK Auto-Build" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          APK_COUNT=$(find android_client/bin -name "*.apk" -type f 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -gt 0 ]; then
            echo "### ✅ Build Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "**APK Files Generated:** $APK_COUNT" >> $GITHUB_STEP_SUMMARY
            ls -lh android_client/bin/*.apk 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ No APK Generated" >> $GITHUB_STEP_SUMMARY
            echo "Build may have failed. Check the logs above." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment Info" >> $GITHUB_STEP_SUMMARY
          echo "- **OS:** Ubuntu ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Java:** $(java -version 2>&1 | head -1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Python:** $(python --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **Buildozer:** $(buildozer --version 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY