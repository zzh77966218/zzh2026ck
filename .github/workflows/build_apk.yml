name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_client/**'
  workflow_dispatch:

env:
  ANDROID_HOME: /opt/android-sdk
  ANDROID_SDK_ROOT: /opt/android-sdk
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  BUILDZOO_SDK_DIR: /opt/android-sdk

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libgbm-dev \
            libwayland-dev \
            xclip \
            zipalign \
            openjdk-17-jdk \
            wget \
            unzip

      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          
          # 自动接受所有license
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_HOME 2>/dev/null
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" "ndk;25b" 2>&1 | tail -5
          
          # 验证安装
          ls -la $ANDROID_HOME

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install cython
          pip install -r android_client/requirements.txt
          pip install buildozer==1.5.0

      - name: Configure buildozer SDK
        run: |
          # 创建buildozer期望的目录结构
          mkdir -p /home/runner/.buildozer/android/platform
          
          # 移除旧的符号链接
          rm -rf /home/runner/.buildozer/android/platform/android-sdk
          
          # 复制SDK内容而非符号链接，确保buildozer能找到所有文件
          cp -r /opt/android-sdk /home/runner/.buildozer/android/platform/android-sdk
          
          # buildozer需要 tools/bin/sdkmanager，创建兼容链接
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # 创建buildozer配置
          mkdir -p /home/runner/.buildozer
          echo "sdk.dir=/home/runner/.buildozer/android/platform/android-sdk" > /home/runner/.buildozer/android.properties
          echo "ndk.dir=/home/runner/.buildozer/android/platform/android-sdk/ndk/25b" >> /home/runner/.buildozer/android.properties
          
          # 同时设置在用户home目录
          echo "sdk.dir=/home/runner/.buildozer/android/platform/android-sdk" > ~/.buildozer/android.properties
          echo "ndk.dir=/home/runner/.buildozer/android/platform/android-sdk/ndk/25b" >> ~/.buildozer/android.properties
          
          echo "=== SDK配置完成 ==="
          ls -la /home/runner/.buildozer/android/platform/android-sdk/

      - name: Build APK
        working-directory: android_client
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          HOME: /home/runner
        run: |
          # 创建local.properties指向我们的SDK
          echo "sdk.dir=/home/runner/.buildozer/android/platform/android-sdk" > local.properties
          echo "ndk.dir=/home/runner/.buildozer/android/platform/android-sdk/ndk/25b" >> local.properties
          
          # 运行buildozer
          buildozer android debug 2>&1 | tee build.log
        continue-on-error: true

      - name: Show build log
        if: failure()
        run: |
          echo "=== Build Log (last 100 lines) ==="
          tail -100 android_client/build.log 2>/dev/null || echo "No build.log found"

      - name: List build output
        run: |
          echo "=== bin directory ==="
          ls -la android_client/bin/ 2>/dev/null || echo "No bin directory"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android_client/build.log
            android_client/.buildozer/**/*.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: remotecontrol-apk
          path: android_client/bin/*.apk
          retention-days: 30