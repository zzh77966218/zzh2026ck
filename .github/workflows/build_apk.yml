name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_client/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  ANDROID_HOME: /opt/android-sdk
  ANDROID_SDK_ROOT: /opt/android-sdk
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /opt/android-sdk
          key: android-sdk-${{ runner.os }}-v1

      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" > /dev/null 2>&1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libgbm-dev \
            libwayland-dev \
            xclip \
            zipalign \
            openjdk-17-jdk

      - name: Install Python dependencies
        working-directory: android_client
        run: |
          pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install buildozer==1.5.0

      - name: Build APK
        working-directory: android_client
        run: |
          buildozer android debug
        continue-on-error: true

      - name: List build output
        if: success()
        working-directory: android_client
        run: |
          ls -la bin/ || echo "No bin directory"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: remotecontrol-apk
          path: android_client/bin/*.apk
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android_client/.buildozer/**/*.log
            ~/.buildozer/logs/*.log
          retention-days: 7