name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_client/**'
  workflow_dispatch:

env:
  ANDROID_HOME: /opt/android-sdk
  ANDROID_SDK_ROOT: /opt/android-sdk
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libgbm-dev \
            libwayland-dev \
            xclip \
            zipalign \
            openjdk-17-jdk \
            wget \
            unzip

      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          
          # 自动接受所有license
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_HOME
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" "ndk;25b"

      - name: Install Python dependencies
        working-directory: android_client
        run: |
          pip install --upgrade pip wheel setuptools
          pip install cython
          pip install -r requirements.txt
          pip install buildozer==1.5.0

      - name: Configure buildozer to use pre-installed SDK
        run: |
          # 创建 buildozer 配置让它使用预安装的 SDK
          mkdir -p /home/runner/.buildozer
          cat > /home/runner/.buildozer/android.properties << 'EOF'
          sdk.dir=/opt/android-sdk
          ndk.dir=/opt/android-sdk/ndk/25b
          EOF

      - name: Build APK
        working-directory: android_client
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
        run: |
          # 确保license被接受
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=/opt/android-sdk 2>/dev/null || true
          
          buildozer android debug 2>&1 | tee build.log
        continue-on-error: true

      - name: Show build log
        if: failure()
        run: |
          echo "=== Build Log (last 100 lines) ==="
          tail -100 android_client/build.log 2>/dev/null || echo "No build.log found"

      - name: List build output
        run: |
          echo "=== bin directory ==="
          ls -la android_client/bin/ 2>/dev/null || echo "No bin directory"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android_client/build.log
            android_client/.buildozer/**/*.log
            ~/.buildozer/logs/*.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: remotecontrol-apk
          path: android_client/bin/*.apk
          retention-days: 30